<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ExamSync — Exam Halls</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}" />
</head>

<body>

  <!-- ===== Loading Spinner ===== -->
  <div class="spinner-overlay" id="spinner" style="display:none">
    <div class="spinner"></div>
    <div class="spinner-text">Loading…</div>
  </div>

  <!-- ===== Toast Container ===== -->
  <div class="toast-container" id="toastContainer"></div>

  <!-- ===== ADD HALL MODAL ===== -->
  <div class="modal-overlay" id="modalHall">
    <div class="modal">
      <div class="modal-header">
        <span class="modal-title" id="modalHallTitle">Add Examination Hall</span>
        <button class="modal-close" onclick="closeModal('modalHall')">×</button>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">Hall Name</label>
          <input class="form-control" id="hallName" placeholder="Great Hall A" />
        </div>
        <div class="form-group">
          <label class="form-label">Location / Block</label>
          <input class="form-control" id="hallLocation" placeholder="Main Academic Block" />
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">Seat Capacity</label>
        <input class="form-control" id="hallCapacity" type="number" placeholder="300" />
      </div>
      <div class="form-group">
        <label class="form-label">Facilities (comma separated)</label>
        <input class="form-control" id="hallFeatures" placeholder="AC, Projector, CCTV" />
      </div>
      <div id="hallModalError" style="display:none;color:#DC2626;font-size:12px;margin-top:8px;"></div>
      <div class="modal-footer">
        <button class="btn btn-outline btn-sm" onclick="closeModal('modalHall')">Cancel</button>
        <button class="btn btn-primary btn-sm" id="saveHallBtn" onclick="saveHall()">Save Hall</button>
      </div>
    </div>
  </div>

  <!-- ===== APP SHELL ===== -->
  <div class="app">

    <!-- TOPBAR -->
    <header class="topbar">
      <div class="topbar-brand">
        <div class="brand-logo">E</div>
        <div class="brand-info">
          <div class="brand-name">ExamSync</div>
          <div class="brand-sub">University Scheduling</div>
        </div>
      </div>
      <div class="topbar-center">
        <div class="topbar-search">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
            <circle cx="11" cy="11" r="8" />
            <path d="m21 21-4.35-4.35" />
          </svg>
          <input type="text" placeholder="Quick search…" />
        </div>
      </div>
      <div class="topbar-right">
        <button class="topbar-icon-btn">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9" />
            <path d="M13.73 21a2 2 0 0 1-3.46 0" />
          </svg>
          <span class="notif-badge">3</span>
        </button>
        <div class="topbar-avatar">AA</div>
      </div>
    </header>

    <!-- SIDEBAR -->
    <aside class="sidebar">
      <nav class="sidebar-nav">
        <div class="sidebar-section-label">Main Menu</div>
        <a class="sidebar-item" href="/dashboard">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <rect x="3" y="3" width="7" height="7" />
            <rect x="14" y="3" width="7" height="7" />
            <rect x="14" y="14" width="7" height="7" />
            <rect x="3" y="14" width="7" height="7" />
          </svg>
          Dashboard
        </a>
        <a class="sidebar-item" href="/tutors">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2" />
            <circle cx="9" cy="7" r="4" />
            <path d="M23 21v-2a4 4 0 0 0-3-3.87" />
            <path d="M16 3.13a4 4 0 0 1 0 7.75" />
          </svg>
          Tutors
        </a>
        <a class="sidebar-item" href="/courses">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <rect x="2" y="3" width="20" height="14" rx="2" />
            <line x1="8" y1="21" x2="16" y2="21" />
            <line x1="12" y1="17" x2="12" y2="21" />
          </svg>
          Courses
        </a>
        <a class="sidebar-item active" href="/halls">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z" />
            <polyline points="9 22 9 12 15 12 15 22" />
          </svg>
          Exam Halls
        </a>
        <a class="sidebar-item" href="/schedule">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <rect x="3" y="4" width="18" height="18" rx="2" ry="2" />
            <line x1="16" y1="2" x2="16" y2="6" />
            <line x1="8" y1="2" x2="8" y2="6" />
            <line x1="3" y1="10" x2="21" y2="10" />
          </svg>
          Schedule Setup
        </a>
        <a class="sidebar-item" href="/generation">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="12" cy="12" r="3" />
            <path d="M19.07 4.93a10 10 0 0 1 0 14.14M4.93 4.93a10 10 0 0 0 0 14.14" />
          </svg>
          Generation
        </a>
        <a class="sidebar-item" href="/timetable">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M8 6h13M8 12h13M8 18h13M3 6h.01M3 12h.01M3 18h.01" />
          </svg>
          Timetable
        </a>
      </nav>
      <div class="sidebar-footer">
        <div class="sidebar-user">
          <div class="sidebar-user-avatar" id="sidebarAvatar">AA</div>
          <div>
            <div class="sidebar-user-name" id="sidebarName">Loading…</div>
            <div class="sidebar-user-role" id="sidebarRole">—</div>
          </div>
        </div>
        <button onclick="handleLogout()" style="width:100%;margin-top:12px;padding:9px;background:transparent;border:1px solid rgba(255,255,255,0.15);border-radius:6px;color:#9CA3AF;font-size:13px;font-weight:500;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;transition:background 0.15s,color 0.15s;" onmouseover="this.style.background='rgba(220,38,38,0.15)';this.style.color='#F87171';" onmouseout="this.style.background='transparent';this.style.color='#9CA3AF';">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
          Logout
        </button>
      </div>
    </aside>

    <!-- MAIN CONTENT -->
    <main class="main">
      <div class="breadcrumb">
        <span style="color:var(--gray-400)">University</span>
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <polyline points="9 18 15 12 9 6" />
        </svg>
        <span>Exam Halls</span>
      </div>
      <div style="padding:28px 32px">
        <div class="page-header">
          <div>
            <div class="page-title">Examination Halls</div>
            <div class="page-subtitle">Register and manage examination venues</div>
          </div>
          <div class="page-actions">
            <button class="btn btn-primary"
              onclick="openAddHallModal()">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                <line x1="12" y1="5" x2="12" y2="19" />
                <line x1="5" y1="12" x2="19" y2="12" />
              </svg>
              Add Hall
            </button>
          </div>
        </div>
        <div class="halls-grid" id="hallsGrid"></div>
      </div>
    </main>
  </div>

  <script>
    // ── Auth guard ──────────────────────────────────────────
    const token = localStorage.getItem('token');
    if (!token) window.location.href = '/login';

    // ── Load user info into sidebar ─────────────────────────
    const user = JSON.parse(localStorage.getItem('user') || '{}');
    if (user.first_name) {
      const initials = (user.first_name[0] || '') + (user.last_name?.[0] || '');
      const avatarEls = document.querySelectorAll('#sidebarAvatar, #userAvatar');
      avatarEls.forEach(el => el.textContent = initials);
      const nameEl = document.getElementById('sidebarName');
      const roleEl = document.getElementById('sidebarRole');
      if (nameEl) nameEl.textContent = user.first_name + ' ' + (user.last_name || '');
      if (roleEl) roleEl.textContent = user.role || 'User';
    }

    // ── Logout ──────────────────────────────────────────────
    async function handleLogout() {
      try {
        await fetch('/api/auth/logout', {
          method: 'POST',
          headers: { 'Authorization': 'Bearer ' + token }
        });
      } catch (_) {}
      localStorage.clear();
      window.location.href = '/login';
    }

    // ── Toast ───────────────────────────────────────────────
    function showToast(msg, type) {
      const c = document.getElementById('toastContainer');
      const t = document.createElement('div');
      t.className = 'toast' + (type === 'success' ? ' success' : type === 'error' ? ' error' : '');
      t.textContent = msg;
      c.appendChild(t);
      setTimeout(() => t.remove(), 3000);
    }

    // ── Modal helpers ───────────────────────────────────────
    function openModal(id) { document.getElementById(id).classList.add('open'); }
    function closeModal(id) { document.getElementById(id).classList.remove('open'); }

    let allHalls = [];
    let editingHallId = null;

    function openAddHallModal() {
      editingHallId = null;
      document.getElementById('modalHallTitle').textContent = 'Add Examination Hall';
      document.getElementById('saveHallBtn').textContent = 'Save Hall';
      clearHallForm();
      openModal('modalHall');
    }

    function openEditHallModal(h) {
      editingHallId = h.id;
      document.getElementById('modalHallTitle').textContent = 'Edit Hall';
      document.getElementById('saveHallBtn').textContent = 'Update Hall';
      document.getElementById('hallName').value     = h.name || '';
      document.getElementById('hallLocation').value = h.location || '';
      document.getElementById('hallCapacity').value = h.capacity || '';
      document.getElementById('hallFeatures').value = Array.isArray(h.facilities) ? h.facilities.join(', ') : (h.facilities || '');
      openModal('modalHall');
    }

    function clearHallForm() {
      ['hallName','hallLocation','hallCapacity','hallFeatures'].forEach(id => document.getElementById(id).value = '');
      document.getElementById('hallModalError').style.display = 'none';
    }

    async function loadHalls() {
      try {
        const res = await fetch('/api/halls', { headers: { 'Authorization': 'Bearer ' + token } });
        if (res.status === 401) { localStorage.clear(); window.location.href = '/login'; return; }
        const data = await res.json();
        allHalls = data.halls || [];
        renderHalls(allHalls);
      } catch(e) {
        document.getElementById('hallsGrid').innerHTML = '<p style="color:#DC2626;padding:32px;">Could not load halls. Make sure Flask is running.</p>';
      }
    }

    function renderHalls(halls) {
      const grid = document.getElementById('hallsGrid');
      if (!halls.length) {
        grid.innerHTML = '<p style="color:var(--gray-400);padding:32px;">No halls yet. Click "Add Hall" to get started.</p>';
        return;
      }
      grid.innerHTML = halls.map(h => `
        <div class="hall-card">
          <div class="hall-card-header">
            <div class="hall-name">${h.name}</div>
            <span class="hall-status ${h.status === 'available' ? 'available' : 'unavailable'}">${h.status}</span>
          </div>
          <div class="hall-location">${h.location || '—'}</div>
          <div class="hall-capacity">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/></svg>
            ${h.capacity} seats
          </div>
          <div class="hall-features">
            ${(Array.isArray(h.facilities) ? h.facilities : []).map(f => '<span class="feature-tag">' + f.trim() + '</span>').join('')}
          </div>
          <div style="display:flex;gap:8px;margin-top:12px;">
            <button class="btn btn-outline btn-sm" onclick='openEditHallModal(${JSON.stringify(h)})'>Edit</button>
            <button class="btn btn-sm" style="background:#FEF2F2;color:#DC2626;border:1px solid #FECACA;" onclick="deleteHall(${h.id},'${h.name}')">Delete</button>
          </div>
        </div>`).join('');
    }

    async function saveHall() {
      const errDiv = document.getElementById('hallModalError');
      const btn    = document.getElementById('saveHallBtn');
      const name   = document.getElementById('hallName').value.trim();
      const cap    = document.getElementById('hallCapacity').value.trim();
      errDiv.style.display = 'none';
      if (!name || !cap) { errDiv.textContent = 'Hall name and capacity are required.'; errDiv.style.display = 'block'; return; }

      btn.disabled = true; btn.textContent = 'Saving…';
      const isEdit = editingHallId !== null;
      const payload = {
        name,
        location:   document.getElementById('hallLocation').value.trim(),
        capacity:   parseInt(cap),
        facilities: document.getElementById('hallFeatures').value.trim(),
      };

      try {
        const res = await fetch(isEdit ? '/api/halls/' + editingHallId : '/api/halls', {
          method:  isEdit ? 'PUT' : 'POST',
          headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + token },
          body:    JSON.stringify(payload)
        });
        const data = await res.json();
        if (!res.ok) { errDiv.textContent = data.error || 'Failed to save.'; errDiv.style.display = 'block'; btn.disabled = false; btn.textContent = isEdit ? 'Update Hall' : 'Save Hall'; return; }
        closeModal('modalHall');
        showToast(isEdit ? 'Hall updated!' : 'Hall added!', 'success');
        loadHalls();
      } catch(e) { errDiv.textContent = 'Server error.'; errDiv.style.display = 'block'; btn.disabled = false; btn.textContent = isEdit ? 'Update Hall' : 'Save Hall'; }
    }

    async function deleteHall(id, name) {
      if (!confirm('Delete hall "' + name + '"?')) return;
      const res = await fetch('/api/halls/' + id, { method: 'DELETE', headers: { 'Authorization': 'Bearer ' + token } });
      if (res.ok) { showToast('Hall deleted.', 'success'); loadHalls(); }
      else showToast('Could not delete hall.', 'error');
    }

    document.getElementById('modalHall').addEventListener('click', function(e) { if (e.target === this) closeModal('modalHall'); });
    loadHalls();
  </script>
</body>

</html>
