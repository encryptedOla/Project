<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ExamSync — Tutors</title>
  <link rel="stylesheet" href="../styles.css" />
</head>
<body>

<!-- ===== Loading Spinner ===== -->
<div class="spinner-overlay" id="spinner">
  <div class="spinner"></div>
  <div class="spinner-text">Loading…</div>
</div>

<!-- ===== Toast Container ===== -->
<div class="toast-container" id="toastContainer"></div>

<!-- ===== ADD TUTOR MODAL ===== -->
<div class="modal-overlay" id="modalTutor">
  <div class="modal">
    <div class="modal-header">
      <span class="modal-title" id="modalTutorTitle">Add Tutor</span>
      <button class="modal-close" onclick="closeModal('modalTutor')">×</button>
    </div>
    <div class="form-group">
      <label class="form-label">Full Name</label>
      <input class="form-control" id="tutorName" placeholder="e.g. Dr. John Mensah" />
    </div>
    <div class="form-row">
      <div class="form-group">
        <label class="form-label">Staff ID</label>
        <input class="form-control" id="tutorStaffId" placeholder="STF-006" />
      </div>
      <div class="form-group">
        <label class="form-label">Department</label>
        <input class="form-control" id="tutorDept" placeholder="Computer Science" />
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label class="form-label">Email</label>
        <input class="form-control" id="tutorEmail" type="email" placeholder="j.mensah@uni.edu" />
      </div>
      <div class="form-group">
        <label class="form-label">Phone</label>
        <input class="form-control" id="tutorPhone" placeholder="+233 24 000 0000" />
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-outline btn-sm" onclick="closeModal('modalTutor')">Cancel</button>
      <button class="btn btn-primary btn-sm" onclick="saveTutor()">Save Tutor</button>
    </div>
  </div>
</div>

<!-- ===== APP SHELL ===== -->
<div class="app">

  <!-- TOPBAR -->
  <header class="topbar">
    <div class="topbar-brand">
      <div class="brand-logo">E</div>
      <div class="brand-info">
        <div class="brand-name">ExamSync</div>
        <div class="brand-sub">University Scheduling</div>
      </div>
    </div>
    <div class="topbar-center">
      <div class="topbar-search">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
        <input type="text" placeholder="Quick search…" />
      </div>
    </div>
    <div class="topbar-right">
      <button class="topbar-icon-btn">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>
        <span class="notif-badge">3</span>
      </button>
      <div class="topbar-avatar">AA</div>
    </div>
  </header>

  <!-- SIDEBAR -->
  <aside class="sidebar">
    <nav class="sidebar-nav">
      <div class="sidebar-section-label">Main Menu</div>
      <a class="sidebar-item" href="dashboard.html">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>
        Dashboard
      </a>
      <a class="sidebar-item active" href="tutors.html">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
        Tutors
      </a>
      <a class="sidebar-item" href="courses.html">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="3" width="20" height="14" rx="2"/><line x1="8" y1="21" x2="16" y2="21"/><line x1="12" y1="17" x2="12" y2="21"/></svg>
        Courses
      </a>
      <a class="sidebar-item" href="halls.html">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
        Exam Halls
      </a>
      <a class="sidebar-item" href="schedule.html">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
        Schedule Setup
      </a>
      <a class="sidebar-item" href="generation.html">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14M4.93 4.93a10 10 0 0 0 0 14.14"/></svg>
        Generation
      </a>
      <a class="sidebar-item" href="timetable.html">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M8 6h13M8 12h13M8 18h13M3 6h.01M3 12h.01M3 18h.01"/></svg>
        Timetable
      </a>
    </nav>
    <div class="sidebar-footer">
      <div class="sidebar-user">
        <div class="sidebar-user-avatar">AA</div>
        <div>
          <div class="sidebar-user-name">Admin Account</div>
          <div class="sidebar-user-role">Registry Officer</div>
        </div>
      </div>
    </div>
  </aside>

  <!-- MAIN CONTENT -->
  <main class="main">
    <div class="breadcrumb">
      <span style="color:var(--gray-400)">University</span>
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="9 18 15 12 9 6"/></svg>
      <span>Tutors</span>
    </div>
    <div style="padding:28px 32px">
      <div class="page-header">
        <div>
          <div class="page-title">Tutor Management</div>
          <div class="page-subtitle">Manage examination supervisors and invigilators</div>
        </div>
        <div class="page-actions">
          <button class="btn btn-primary" onclick="openModal('modalTutor'); document.getElementById('modalTutorTitle').textContent='Add Tutor'; clearTutorForm()">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
            Add Tutor
          </button>
        </div>
      </div>
      <div class="table-container">
        <div class="table-toolbar">
          <div class="table-search">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
            <input type="text" placeholder="Search tutors by name or department…" oninput="filterTutors(this.value)" />
          </div>
        </div>
        <table>
          <thead>
            <tr>
              <th>Name</th><th>Staff ID</th><th>Department</th><th>Email</th><th>Phone</th><th>Actions</th>
            </tr>
          </thead>
          <tbody id="tutorsTableBody"></tbody>
        </table>
        <div class="table-footer">
          <span class="table-count" id="tutors-count"></span>
        </div>
      </div>
    </div>
  </main>
</div>

<script src="../app.js"></script>
</body>
</html>
